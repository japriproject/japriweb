name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Generate Prisma client
      run: npx prisma generate
      
    - name: Build application
      run: npm run build
      
    - name: Create deployment package
      run: |
        mkdir -p deploy-temp
        rsync -av --exclude='node_modules' --exclude='.git' --exclude='.next' --exclude='.github' --exclude='*.log' --exclude='logs' --exclude='.turbo' --exclude='debug-login.js' ./ deploy-temp/
        cd deploy-temp
        tar -czf ../deploy.tar.gz .
        
    - name: Transfer files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 72.62.121.108
        username: vps
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        timeout: 300s
        command_timeout: 300s
        source: "deploy.tar.gz"
        target: "/home/japriweb/"
        
    - name: Deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 72.62.121.108
        username: vps
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          cd /home/japriweb
          
          # Stop the application if running
          pm2 stop pulsa-app || true
          
          # Backup current version
          if [ -d "pulsa-app-backup" ]; then
            rm -rf pulsa-app-backup
          fi
          if [ -d "pulsa-app" ]; then
            mv pulsa-app pulsa-app-backup
          fi
          
          # Create new app directory
          mkdir pulsa-app
          cd pulsa-app
          
          # Extract new files
          tar -xzf ../deploy.tar.gz
          
          # Create .env file from secrets
          cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF
          
          # Install all dependencies required for the production build
          npm ci
          
          # Generate Prisma client
          npx prisma generate

          # Apply migrations and reconcile known legacy objects that were created
          # before Prisma migration history was introduced.
          MIGRATIONS_APPLIED=0
          for ATTEMPT in 1 2 3 4; do
            if MIGRATION_OUTPUT="$(npx prisma migrate deploy 2>&1)"; then
              echo "$MIGRATION_OUTPUT"
              MIGRATIONS_APPLIED=1
              break
            fi

            echo "$MIGRATION_OUTPUT"
            RECOVERED=0

            if echo "$MIGRATION_OUTPUT" | grep -Fq "20260626161000_add_hotel_booking"; then
              OBJECTS_EXIST="$(node -e 'const { PrismaClient } = require("@prisma/client"); const p = new PrismaClient(); p.$queryRawUnsafe("SELECT COUNT(*) AS count FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name = ?", "hotel_booking").then((r) => console.log(Number(r[0].count))).finally(() => p.$disconnect());')"
              if [ "$OBJECTS_EXIST" = "1" ]; then
                npx prisma migrate resolve --applied 20260626161000_add_hotel_booking
                RECOVERED=1
              fi
            elif echo "$MIGRATION_OUTPUT" | grep -Fq "20260628090000_add_password_reset_tokens"; then
              OBJECTS_EXIST="$(node -e 'const { PrismaClient } = require("@prisma/client"); const p = new PrismaClient(); p.$queryRawUnsafe("SELECT COUNT(*) AS count FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name = ?", "password_reset_tokens").then((r) => console.log(Number(r[0].count))).finally(() => p.$disconnect());')"
              if [ "$OBJECTS_EXIST" = "1" ]; then
                npx prisma migrate resolve --applied 20260628090000_add_password_reset_tokens
                RECOVERED=1
              fi
            elif echo "$MIGRATION_OUTPUT" | grep -Fq "20260628170000_add_email_verification"; then
              OBJECTS_EXIST="$(node -e 'const { PrismaClient } = require("@prisma/client"); const p = new PrismaClient(); Promise.all([p.$queryRawUnsafe("SELECT COUNT(*) AS count FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name = ?", "email_verification_tokens"), p.$queryRawUnsafe("SELECT COUNT(*) AS count FROM information_schema.columns WHERE table_schema = DATABASE() AND table_name = ? AND column_name = ?", "members", "email_verified_at")]).then(([t,c]) => console.log(Number(t[0].count) === 1 && Number(c[0].count) === 1 ? 1 : 0)).finally(() => p.$disconnect());')"
              if [ "$OBJECTS_EXIST" = "1" ]; then
                npx prisma migrate resolve --applied 20260628170000_add_email_verification
                RECOVERED=1
              fi
            fi

            if [ "$RECOVERED" != "1" ]; then
              echo "Migration failed and its required database objects are incomplete."
              exit 1
            fi
          done

          if [ "$MIGRATIONS_APPLIED" != "1" ]; then
            echo "Migrations did not complete after recovery attempts."
            exit 1
          fi

          # Fail the deployment if any migration remains pending or failed.
          npx prisma migrate status

          # Build after .env is available on the server
          npm run build

          # Remove development-only packages after a successful build
          npm prune --omit=dev
          
          # Start with PM2
          pm2 delete pulsa-app || true
          pm2 start npm --name "pulsa-app" -- start
          pm2 save
          
          # Cleanup
          rm ../deploy.tar.gz
          
          echo "Deployment completed successfully"
