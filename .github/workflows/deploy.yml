name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm install
      
    - name: Generate Prisma client
      run: npx prisma generate
      
    - name: Build application
      run: npm run build
      
    - name: Create deployment package
      run: |
        mkdir -p deploy-temp
        rsync -av --exclude='node_modules' --exclude='.git' --exclude='.next' --exclude='.github' --exclude='*.log' --exclude='logs' --exclude='.turbo' --exclude='debug-login.js' ./ deploy-temp/
        cd deploy-temp
        tar -czf ../deploy.tar.gz .
        
    - name: Transfer files to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: 72.62.121.108
        username: vps
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        timeout: 300s
        command_timeout: 300s
        source: "deploy.tar.gz"
        target: "/home/japriweb/"
        
    - name: Deploy on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 72.62.121.108
        username: vps
        password: ${{ secrets.SERVER_PASSWORD }}
        port: 22
        script: |
          cd /home/japriweb
          
          # Stop the application if running
          pm2 stop pulsa-app || true
          
          # Backup current version
          if [ -d "pulsa-app-backup" ]; then
            rm -rf pulsa-app-backup
          fi
          if [ -d "pulsa-app" ]; then
            mv pulsa-app pulsa-app-backup
          fi
          
          # Create new app directory
          mkdir pulsa-app
          cd pulsa-app
          
          # Extract new files
          tar -xzf ../deploy.tar.gz
          
          # Create .env file from secrets
          cat > .env << 'EOF'
          ${{ secrets.ENV_FILE }}
          EOF
          
          # Install all dependencies required for the production build
          npm ci
          
          # Generate Prisma client
          npx prisma generate

          # Apply pending database migrations. Recover the legacy hotel migration
          # only when its table is already present in the target database.
          if ! MIGRATION_OUTPUT="$(npx prisma migrate deploy 2>&1)"; then
            echo "$MIGRATION_OUTPUT"

            HOTEL_TABLE_EXISTS="$(node -e 'const { PrismaClient } = require("@prisma/client"); const prisma = new PrismaClient(); prisma.$queryRawUnsafe("SELECT COUNT(*) AS count FROM information_schema.tables WHERE table_schema = DATABASE() AND table_name = ?", "hotel_booking").then((rows) => { console.log(Number(rows[0].count)); }).finally(() => prisma.$disconnect());')"

            if echo "$MIGRATION_OUTPUT" | grep -Fq "20260626161000_add_hotel_booking" && [ "$HOTEL_TABLE_EXISTS" = "1" ]; then
              echo "hotel_booking already exists; recording its legacy migration as applied."
              npx prisma migrate resolve --applied 20260626161000_add_hotel_booking
              npx prisma migrate deploy
            else
              echo "Migration failed and cannot be recovered automatically."
              exit 1
            fi
          else
            echo "$MIGRATION_OUTPUT"
          fi

          # Fail the deployment if any migration remains pending or failed.
          npx prisma migrate status

          # Build after .env is available on the server
          npm run build

          # Remove development-only packages after a successful build
          npm prune --omit=dev
          
          # Start with PM2
          pm2 delete pulsa-app || true
          pm2 start npm --name "pulsa-app" -- start
          pm2 save
          
          # Cleanup
          rm ../deploy.tar.gz
          
          echo "Deployment completed successfully"
